{% extends "base.twig.html" %}

{% block title %}Parcours des offres - Job2main{% endblock %}
{% block description %}Parcourez nos offres de stages et trouvez celle qui vous correspond !{% endblock %}

{% block body %}
	 
	   <section>
			<h1 class="text-center">POSTULER À L'OFFRE</h1>
	   </section>
       <section class="apply-section">
            <h3>Postuler à cette offre</h3>
            <form action="traitement_candidature.php" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="cv">Votre CV (PDF uniquement) :</label>
                    <input type="file" id="cv" name="cv" accept=".pdf" required>
                </div>

                <div class="form-group">
                    <label for="motivation">Lettre de motivation :</label>
                    <textarea id="motivation" name="motivation" rows="8" placeholder="Expliquez pourquoi ce stage vous intéresse..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Envoyer ma candidature</button>
            </form>
        </section>
{% endblock %}
